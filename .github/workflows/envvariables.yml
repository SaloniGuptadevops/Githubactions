name: Environment Variables Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: myapp

jobs:
  env-job:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: staging

    steps:
      - name: Print All Variables
        env:
          VERSION: 1.0.0
        run: |
          echo "Workflow Level: $APP_NAME"
          echo "Job Level: $ENVIRONMENT"
          echo "Step Level: $VERSION"
          echo "Commit SHA: $GITHUB_SHA"
          echo "Triggered By: $GITHUB_ACTOR"
