name: Job Outputs Demo

on:
  workflow_dispatch:

jobs:
  set-date:
    runs-on: ubuntu-latest
    outputs:
      today: ${{ steps.getdate.outputs.today }}

    steps:
      - name: Get Today's Date
        id: getdate
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

  print-date:
    runs-on: ubuntu-latest
    needs: set-date

    steps:
      - name: Print Output from Previous Job
        run: echo "Today's date is ${{ needs.set-date.outputs.today }}"
