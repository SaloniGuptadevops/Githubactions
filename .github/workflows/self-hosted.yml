name: Self Hosted Runner Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  self-hosted-job:
    runs-on: self-hosted

    steps:
      - name: Print Hostname
        run: hostname

      - name: Print Working Directory
        run: pwd

      - name: Create a File
        run: |
          echo "Hello from self-hosted runner" > myfile.txt
          echo "File created successfully"

      - name: Verify File
        run: |
          ls -l
          cat myfile.txt
