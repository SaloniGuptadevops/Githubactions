name: Download Artifacts Between Jobs

on:
  workflow_dispatch:

jobs:
  create-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Create report file
        run: |
          echo "Build Report" > report.txt
          echo "Status: Success" >> report.txt
          echo "Created on: $(date)" >> report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: report.txt

  use-artifact:
    runs-on: ubuntu-latest
    needs: create-artifact

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-report

      - name: Show downloaded file
        run: cat report.txt
