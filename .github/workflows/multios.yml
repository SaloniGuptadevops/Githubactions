name: Multi OS Runner Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ubuntu-job:
    runs-on: [self-hosted, Linux]

    steps:
      - name: Print system details (Ubuntu)
        run: |
          echo "OS: Ubuntu"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"

      - name: Check pre-installed tools
        run: |
          echo "Docker version:"
          docker --version || echo "Docker not installed"

          echo "Python version:"
          python3 --version || echo "Python not installed"

          echo "Node version:"
          node --version || echo "Node not installed"

          echo "Git version:"
          git --version || echo "Git not installed"

  windows-job:
    runs-on: windows-latest

    steps:
      - name: Print system details (Windows)
        run: |
          echo "OS: Windows"
          hostname
          whoami

  macos-job:
    runs-on: macos-latest

    steps:
      - name: Print system details (macOS)
        run: |
          echo "OS: macOS"
          hostname
          whoami
