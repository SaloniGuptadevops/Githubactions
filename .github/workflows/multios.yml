name: Multi OS Runner Demo

on:
  push:
    branches:
      - main

jobs:
  ubuntu-job:
    runs-on: self-hosted
    steps:
      - name: Print details (Ubuntu)
        run: |
          echo "OS: Ubuntu"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"

      - name: Check pre-installed tools
        run: |
          echo "Docker version:"
          docker --version
          echo "Python version:"
          python3 --version
          echo "Node version:"
          node --version
          echo "Git version:"
          git --version

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Print details (Windows)
        run: |
          echo "OS: Windows"
          hostname
          whoami

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Print details (macOS)
        run: |
          echo "OS: macOS"
          hostname
          whoami
