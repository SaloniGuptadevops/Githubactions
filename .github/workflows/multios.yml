name: Multi OS Runner Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ubuntu-job:
    runs-on: [self-hosted, Linux]

    steps:
      - name: Print system details
        run: |
          echo "OS: Ubuntu"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"

      - name: Install Python
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip

      - name: Check tools
        run: |
          echo "Docker version:"
          docker --version || echo "Docker not installed"

          echo "Python version:"
          python3 --version

          echo "Node version:"
          node --version || echo "Node not installed"

          echo "Git version:"
          git --version

  windows-job:
    runs-on: windows-latest
    steps:
      - run: echo "Windows OK"

  macos-job:
    runs-on: macos-latest
    steps:
      - run: echo "macOS OK"
